<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Партнерская программа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: #050507;
            --card-bg: rgba(22, 23, 26, 0.95);
            --accent-color: #007aff;
            --text-color: #ffffff;
            --secondary-text: #8e8e93;
            --cosmic-primary: #00d2ff;
            --cosmic-secondary: #9d50bb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* --- Звездный фон (Canvas) --- */
        #starCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 90%); z-index: -1; pointer-events: none; }

        /* --- Контейнер контента --- */
        .main-container {
            width: 100%;
            max-width: 380px;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 1;
            padding-bottom: 20px;
        }

        /* --- Верхний баннер --- */
        .promo-card {
            background: rgba(26, 26, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        /* Картинка подруг */
        .promo-image {
            width: 90px;
            height: auto;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        .promo-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            width: 100%;
        }

        .promo-text {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
        }

        /* КОНТЕЙНЕР: +50 слева, прайс справа */
        .promo-reward-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        /* Плашка для награды */
        .promo-reward-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 4px 0 16px;
            background: rgba(0, 122, 255, 0.15);
            border: 1px solid rgba(0, 122, 255, 0.3);
            border-radius: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.1);
        }

        .star-icon {
            width: 40px; /* Размер не тронут */
            height: 40px;
            object-fit: contain;
            margin-left: -6px;
            margin-right: -4px;
            position: relative;
            top: 1px; /* Увеличивай это значение (например, 6px), чтобы опустить еще ниже */
            filter: drop-shadow(0 0 6px rgba(0, 210, 255, 0.4));
        }

        /* === ПРАЙС-ЛИСТ (Стал более компактным) === */
        .promo-prices {
            display: flex;
            flex-direction: column;
            gap: 3.5px; /* Чуть уменьшили расстояние между плашками */
        }

        .promo-price-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1px 8px; /* Меньше отступы внутри рамки */
            border-radius: 8px; /* Чуть меньше закругление */
            font-size: 11.5px; /* Шрифт чуть меньше */
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            width: 120px; /* Уменьшили ширину плашек */
        }

        .price-text {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .price-val {
            display: flex;
            align-items: center;
            font-size: 10px; /* Цена чуть компактнее */
            font-weight: 800;
            color: #fff;
        }

        .star-icon-small {
            width: 20px; /* Размер не тронут */
            height: 15px;
            object-fit: contain;
            margin-left: -2px;
            transform: translateY(0.8px);
            filter: drop-shadow(0 0 4px rgba(0, 210, 255, 0.3));
        }

        /* --- Заголовки блоков --- */
        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--secondary-text);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            padding-left: 4px;
        }

        /* --- Блок со ссылкой --- */
        .link-wrapper {
            background: rgba(26, 26, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .link-wrapper:active {
            transform: scale(0.97);
            background: rgba(40, 40, 45, 0.95);
            border-color: var(--accent-color);
        }

        .link-text {
            font-size: 15px;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
            opacity: 0.9;
        }

        .copy-icon {
            width: 22px;
            height: 22px;
            fill: var(--accent-color);
            flex-shrink: 0;
            margin-left: 12px;
        }

        /* --- Список друзей --- */
        .friends-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .friends-card {
            overflow-y: auto;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px 16px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .friends-card::-webkit-scrollbar { width: 4px; }
        .friends-card::-webkit-scrollbar-track { background: transparent; }
        .friends-card::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .friend-item:last-child { border-bottom: none; }

        .friend-name { font-size: 16px; font-weight: 500; color: #fff; }

        .empty-friends {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--secondary-text);
            font-size: 14px;
            opacity: 0.6;
            background: var(--card-bg);
            border-radius: 12px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* --- Кнопка действия --- */
        .invite-btn {
            width: 100%;
            background: var(--accent-color);
            border: none;
            border-radius: 16px;
            padding: 18px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
            flex-shrink: 0;
        }

        .invite-btn:active { transform: scale(0.97); }

        /* --- Уведомление (Тост) --- */
        .toast {
            position: fixed;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(48, 209, 88, 0.2);
            border: 1px solid rgba(48, 209, 88, 0.5);
            color: #30d158;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
        }

        .toast.show {
            top: 20px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>
    <div class="overlay"></div>

    <div id="toast" class="toast">Ссылка скопирована в буфер обмена</div>

    <div class="main-container">

        <div class="promo-card">
            <img src="bestie228.png" class="promo-image" alt="Besties">
            <div class="promo-content">
                <div class="promo-text">Как только подруга перейдет по ссылке и сделает свой первый расклад, вы сразу получите</div>

                <div class="promo-reward-container">

                    <div class="promo-reward-badge">
                        +50 <img src="starxd.png" class="star-icon" alt="star">
                    </div>

                    <div class="promo-prices">
                        <div class="promo-price-item">
                            <span class="price-text">🔮 Расклад</span>
                            <span class="price-val">6 <img src="starxd.png" class="star-icon-small" alt="star"></span>
                        </div>
                        <div class="promo-price-item">
                            <span class="price-text">❤️ Диалог</span>
                            <span class="price-val">1 <img src="starxd.png" class="star-icon-small" alt="star"></span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="section-label">Ваша персональная ссылка</div>
        <div class="link-wrapper" onclick="copyReferralLink()">
            <div class="link-text" id="refLinkText">Загрузка ссылки...</div>
            <svg class="copy-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/>
            </svg>
        </div>

        <div class="friends-container" id="friendsContainer">
            <div class="section-label">Ваши друзья (<span id="friendsCount">0</span>)</div>
        </div>

        <button class="invite-btn" onclick="inviteFriends()">Пригласить друзей</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        /* --- АНИМАЦИЯ ЗВЕЗД (CSS Canvas) --- */
        (function() {
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, stars = [];
            const STAR_COUNT = 3000;
            const SPEED = 0.35;

            function initStars() {
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width; canvas.height = height;
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width - width/2,
                        y: Math.random() * height - height/2,
                        z: Math.random() * width
                    });
                }
            }

            function updateStars() {
                ctx.clearRect(0, 0, width, height);
                for (let s of stars) {
                    s.z -= SPEED;
                    if (s.z <= 0) { s.z = width; s.x = Math.random() * width - width/2; s.y = Math.random() * height - height/2; }
                    const pX = (s.x / s.z) * (width * 0.5) + width/2;
                    const pY = (s.y / s.z) * (height * 0.5) + height/2;
                    const size = (1 - s.z / width) * 2;
                    ctx.fillStyle = `rgba(255, 255, 255, ${1 - s.z / width})`;
                    ctx.beginPath(); ctx.arc(pX, pY, size, 0, Math.PI * 2); ctx.fill();
                }
                requestAnimationFrame(updateStars);
            }

            window.addEventListener('resize', initStars);
            initStars();
            updateStars();
        })();

        /* --- ЛОГИКА РЕФЕРАЛКИ --- */

        let BOT_URL = "https://t.me/YourProrokBot?start=ref12345";
        let SHARE_TEXT = `Слушай, я тут наткнулась на одного бота... сижу с ним уже час,
разговариваю, карты раскладываю. Он такой душевный, прям как живой. В
общем, делюсь находкой: ${BOT_URL} и там еще халявный доступ сначала. Так что даже если тебе не понравится - ты ничего не потеряешь) 👇`;

        function renderData() {
            document.getElementById('refLinkText').innerText = BOT_URL;

            const myFriends = [];

            const container = document.getElementById('friendsContainer');
            document.getElementById('friendsCount').innerText = myFriends.length;

            const label = container.querySelector('.section-label');
            container.innerHTML = '';
            container.appendChild(label);

            if (myFriends.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-friends';
                emptyDiv.innerText = 'вы еще не пригласили своих подруг';
                container.appendChild(emptyDiv);
            } else {
                const listDiv = document.createElement('div');
                listDiv.className = 'friends-card';

                listDiv.innerHTML = myFriends.map(friend => `
                    <div class="friend-item">
                        <div class="friend-name">${friend.name}</div>
                    </div>
                `).join('');

                container.appendChild(listDiv);
            }
        }

        function vibrate() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function copyReferralLink() {
            vibrate();
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(BOT_URL).then(showToast);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = BOT_URL;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (error) {}
                textArea.remove();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function inviteFriends() {
            vibrate();
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(BOT_URL)}&text=${encodeURIComponent(SHARE_TEXT)}`;
            tg.openTelegramLink(shareUrl);
        }

        renderData();

    </script>
</body>
</html>
