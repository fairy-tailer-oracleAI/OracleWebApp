<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль пользователя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: #050507;
            --card-bg: rgba(20, 20, 25, 0.75);
            --accent-color: #007aff;
            --text-color: #ffffff;
            --secondary-text: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        #starCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 90%);
            z-index: -1;
            pointer-events: none;
        }

        /* Хедер пользователя */
        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 380px;
            margin-top: 10px;
            margin-bottom: 20px;
            z-index: 1;
        }

        .avatar-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: var(--card-bg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        .user-name {
            font-size: 22px;
            font-weight: 700;
        }

        /* Карточка баланса */
        .balance-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            text-align: center;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--secondary-text);
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .star-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            transform: scale(1.8) translate(-2px, 1px);
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6))
                    drop-shadow(0 0 15px rgba(157, 80, 187, 0.3));
            -webkit-filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6))
                            drop-shadow(0 0 15px rgba(157, 80, 187, 0.3));
        }

        .btn-action {
            width: 100%;
            background: var(--accent-color);
            border: none;
            border-radius: 18px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.35);
        }

        .btn-action:active { transform: scale(0.97); }

        /* НОВЫЙ БЛОК СЕРИИ */
        .streak-container {
            margin-top: 16px;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(20, 20, 25, 0.4);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px 20px; /* Сделали нормальные отступы */
            z-index: 1;
            backdrop-filter: blur(10px);
            animation: fadeInScale 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* МУЛЬТЯШНЫЙ ОГОНЬ НА CSS */
        .flame-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 12px; /* Отступ до текста, чтобы не слипалось */
            display: flex;
            justify-content: center;
        }

        .flame-main {
            position: absolute;
            bottom: 0;
            width: 44px;
            height: 44px;
            background: linear-gradient(-45deg, #ff0000 0%, #ff7700 100%);
            border-radius: 50% 0 50% 50%; /* Создает форму капли */
            transform: rotate(-45deg);
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.5);
            animation: pulseFlame 1s infinite alternate ease-in-out;
        }

        .flame-inner {
            position: absolute;
            bottom: 4px;
            width: 24px;
            height: 24px;
            background: linear-gradient(-45deg, #ffbb00 0%, #ffea00 100%);
            border-radius: 50% 0 50% 50%;
            transform: rotate(-45deg);
            animation: pulseFlameInner 1s infinite alternate ease-in-out;
            animation-delay: 0.1s;
        }

        /* Искры */
        .spark {
            position: absolute;
            background: #ffea00;
            border-radius: 50%;
            bottom: 20px;
            opacity: 0;
        }
        .spark-1 { width: 6px; height: 6px; left: 10px; animation: flySpark 1.2s infinite ease-in; }
        .spark-2 { width: 4px; height: 4px; right: 10px; animation: flySpark 1.5s infinite ease-in 0.4s; }
        .spark-3 { width: 5px; height: 5px; left: 30px; animation: flySpark 1.3s infinite ease-in 0.8s; }

        @keyframes pulseFlame {
            0% { transform: rotate(-45deg) scale(1) skew(0deg, 0deg); }
            100% { transform: rotate(-45deg) scale(1.05) skew(2deg, 2deg); box-shadow: 0 0 30px rgba(255, 100, 0, 0.8); }
        }
        @keyframes pulseFlameInner {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-45deg) scale(1.1); }
        }
        @keyframes flySpark {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(0); opacity: 0; }
        }

        /* Текст серии */
        .streak-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .streak-count {
            font-size: 26px;
            font-weight: 900;
            color: #ff9a00;
            text-shadow: 0 0 15px rgba(255, 154, 0, 0.4);
            margin-top: 4px;
            text-align: center;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <div class="overlay"></div>

    <div class="user-header">
        <div class="avatar-circle" id="avatarCircle"></div>
        <div class="user-info-text">
            <div class="user-name" id="userName">Загрузка...</div>
        </div>
    </div>

    <div class="balance-card">
        <div class="label">Текущий баланс</div>
        <div class="balance-value">
            <span id="balanceAmount">...</span>
            <img src="starxd.png" class="star-icon" alt="star">
        </div>
        <button class="btn-action" id="topUpButton">💳 Пополнить баланс</button>
    </div>

    <div class="streak-container">
        <div class="flame-wrapper">
            <div class="spark spark-1"></div>
            <div class="spark spark-2"></div>
            <div class="spark spark-3"></div>
            <div class="flame-main"></div>
            <div class="flame-inner"></div>
        </div>
        <div class="streak-label">Серия с пророком</div>
        <div class="streak-count" id="streakCount">...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        tg.BackButton.hide();
        
        /* --- АНИМАЦИЯ ЗВЕЗДНОГО ФОНА --- */
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;
        let stars = [];
        const STAR_COUNT = 1500;
        const SPEED = 0.35;

        function initStars() {
            width = window.innerWidth;
            height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            canvas.width = width;
            canvas.height = height;

            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width - centerX,
                    y: Math.random() * height - centerY,
                    z: Math.random() * width
                });
            }
        }

        function updateStars() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < STAR_COUNT; i++) {
                let s = stars[i];
                s.z -= SPEED;
                if (s.z <= 0) {
                    s.z = width;
                    s.x = Math.random() * width - centerX;
                    s.y = Math.random() * height - centerY;
                }
                const pX = (s.x / s.z) * (width * 0.5) + centerX;
                const pY = (s.y / s.z) * (height * 0.5) + centerY;
                const size = (1 - s.z / width) * 2.2;
                const opacity = (1 - s.z / width) * 0.8;

                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(pX, pY, size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(updateStars);
        }

        // Загрузка данных пользователя
        function loadUser(user) {
            document.getElementById('userName').textContent =
                user.first_name + (user.last_name ? ' ' + user.last_name : '');
            const avatar = document.getElementById('avatarCircle');
            if (user.photo_url) {
                avatar.innerHTML = `<img src="${user.photo_url}" class="avatar-img">`;
            } else {
                avatar.innerHTML = `<span style="font-size:24px">${user.first_name[0]}</span>`;
            }
        }

        // Загрузка баланса
        function loadBalance(user) {
            fetch(`/user-balance/?user_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    if (data.balance !== undefined) {
                        document.getElementById('balanceAmount').textContent = data.balance;
                    }
                })
                .catch(err => console.error('Баланс не загружен:', err));
        }

        function loadStreak(user) {
            fetch(`/user-streak/?user_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    const el = document.getElementById('streakCount');
                    if (el) el.textContent = (data.streak || 0) + ' Дней';
                })
                .catch(() => {
                    const el = document.getElementById('streakCount');
                    if (el) el.textContent = '0 Дней';
                });
        }

        document.getElementById('topUpButton').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = 'https://stage.ai-prorok.webtm.ru/payment/';
        });

        window.addEventListener('resize', initStars);
        initStars();
        updateStars();
        function waitForUser(attempt = 0) {
            const user = tg?.initDataUnsafe?.user;
            if (user) {
                loadUser(user);
                loadBalance(user);
                loadStreak(user);
            } else if (attempt < 15) {
                setTimeout(() => waitForUser(attempt + 1), 150);
            } else {
                document.getElementById('userName').textContent = 'Пользователь';
                document.getElementById('balanceAmount').textContent = '0';
                document.getElementById('streakCount').textContent = '0';
            }
        }
        waitForUser();
    </script>
</body>
</html>
