<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гадание на картах Таро</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: #050507; /* Глубокий космический цвет из профиля */
        }

        /* Базовые сбросы стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Основные стили страницы */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
            background-color: var(--bg-color); /* Убрали гифку, поставили цвет фона */
        }

        /* --- СТИЛИ ДЛЯ ЗВЕЗДНОГО ФОНА --- */
        #starCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 90%);
            z-index: -1;
            pointer-events: none;
        }

        /* Прелоадер */
        #preloader {
          position: fixed;
          z-index: 9999;
          background-color: black;
          width: 100vw;
          height: 100vh;
          top: 0;
          left: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #preloader.fade-out {
          opacity: 0;
          visibility: hidden;
        }

        .preloader-image {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        /* Стили для текстовой подсказки */
        .prompt {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: opacity 0.5s ease;
            z-index: 1;
        }
        .prompt.fade-out {
            opacity: 0;
        }

        /* Контейнер для карт */
        .card-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 600px;
            margin-bottom: 20px;
            z-index: 1;
        }

        /* Обертка для карты */
        .card-wrapper {
            width: 100%;
            aspect-ratio: 1.85/3;
            transition: opacity 0.3s ease;
        }

        /* Стили самой карты */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            perspective: 1000px;
            cursor: pointer;
            border-radius: 8px;
            transform-style: preserve-3d;
            transition: transform 0.6s ease, box-shadow 0.3s ease;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Стороны карты (лицевая и обратная) */
        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
        }
        .card-front {
            background-position: center 61%;
            transform: rotateY(180deg);
        }
        .card-back {
            background-image: url('card/back3.png');
        }

        /* Свечение выбранной карты */
        .card-flipped-glow {
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.7);
        }

        /* Ряд для выбранных карт */
        .selected-row {
            position: fixed;
            top: 50%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 10;
            padding: 0 20px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Обертка для выбранной карты */
        .selected-card-wrapper {
            width: calc((90vw - 50px) / 3);
            aspect-ratio: 1.85/3;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Анимация перемещения карты */
        .flying-card {
            position: fixed;
            z-index: 100;
            transition: all 1s cubic-bezier(.8,.86,.4,1);
            pointer-events: none;
        }

        /* === ВИДИМАЯ СТЕКЛЯННАЯ КНОПКА С ПЛАВНОЙ ПУЛЬСАЦИЕЙ === */
        .bubbly-button {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            font-weight: 700;
            padding: 16px 28px;

            width: 85%;
            
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%) translateY(30px);

            /* Эффект матового стекла, сделанный чуть плотнее, чтобы было видно */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.5); /* Блик сверху */

            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); /* Чтобы текст хорошо читался */
            border-radius: 18px;
            cursor: pointer;
            opacity: 0;
            z-index: 20;
            white-space: normal;
            letter-spacing: 0.5px;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;

            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bubbly-button.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
            /* Плавное и медленное "дыхание" */
            animation: slowPulse 3.5s infinite ease-in-out;
        }

        .bubbly-button:active {
            transform: translateX(-50%) translateY(2px) scale(0.97) !important;
            background: rgba(255, 255, 255, 0.2);
            animation: none; /* При нажатии пульсация останавливается */
        }

        /* Медленная пульсация (размер + мягкое свечение) */
        @keyframes slowPulse {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 10px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                transform: translateX(-50%) scale(1.04);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 25px 0 rgba(255, 255, 255, 0.3);
            }
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <div class="overlay"></div>

    <div id="preloader">
      <img src="card/preloader.gif" alt="Загрузка..." class="preloader-image">
    </div>

    <div class="prompt" id="prompt"></div>
    <div class="card-container" id="card-container"></div>
    <div class="selected-row" id="selected-row"></div>

    <button class="bubbly-button" id="fateButton" disabled>✨ Узнать предначертанное ✨</button>

    <script>
        /* --- АНИМАЦИЯ ЗВЕЗДНОГО ФОНА --- */
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let bgWidth, bgHeight, centerX, centerY;
        let bgStars = [];
        const STAR_COUNT = 8000;
        const SPEED = 0.35;

        function initStars() {
            bgWidth = window.innerWidth;
            bgHeight = window.innerHeight;
            centerX = bgWidth / 2;
            centerY = bgHeight / 2;
            canvas.width = bgWidth;
            canvas.height = bgHeight;

            bgStars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                bgStars.push({
                    x: Math.random() * bgWidth - centerX,
                    y: Math.random() * bgHeight - centerY,
                    z: Math.random() * bgWidth
                });
            }
        }

        function updateStars() {
            ctx.clearRect(0, 0, bgWidth, bgHeight);
            for (let i = 0; i < STAR_COUNT; i++) {
                let s = bgStars[i];
                s.z -= SPEED;
                if (s.z <= 0) {
                    s.z = bgWidth;
                    s.x = Math.random() * bgWidth - centerX;
                    s.y = Math.random() * bgHeight - centerY;
                }
                const pX = (s.x / s.z) * (bgWidth * 0.5) + centerX;
                const pY = (s.y / s.z) * (bgHeight * 0.5) + centerY;
                const size = (1 - s.z / bgWidth) * 2.2;
                const opacity = (1 - s.z / bgWidth) * 0.8;

                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(pX, pY, size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(updateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        updateStars();

        /* --- ЛОГИКА ТАРО --- */
        const BASE = {
            FLIP_DELAY: 300,
            PROMPT_FADE_DELAY: 500,
            CARD_MOVE_DELAY: 100,
            BUTTON_SHOW_DELAY: 300
        };

        const params = new URLSearchParams(location.search);
        const total  = parseInt(params.get('total') , 10) || 8;
        const select = parseInt(params.get('select'), 10) || 3;

        const CONFIG = {
            TOTAL_CARDS: total,
            SELECT_CARDS: select,
            ...BASE
        };

        const promptEl = document.getElementById('prompt');

        if (CONFIG.SELECT_CARDS === 1) {
          promptEl.textContent = 'Выберите 1 карту';
        } else if (CONFIG.SELECT_CARDS === 3) {
          promptEl.textContent = 'Выберите 3 карты';
        } else if (CONFIG.SELECT_CARDS === 4) {
          promptEl.textContent = 'Выбрерите 4 карты';
        } else if (CONFIG.SELECT_CARDS === 7) {
          promptEl.textContent = 'Выберите 7 карт';
        }

        window.addEventListener('load', () => {
          const preloader = document.getElementById('preloader');
          setTimeout(() => {
            preloader.classList.add('fade-out');
            setTimeout(() => {
              preloader.remove();
            }, 600);
          }, 3350);
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                Telegram.WebApp.expand();
            }
            initTarotApp();
        });

        function initTarotApp() {
            fetch('card/cards_path.json')
                .then(response => response.json())
                .then(data => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const excludeParam = urlParams.get('exclude');

                    let filteredData = data;

                    if (excludeParam) {
                        const excludeList = decodeURIComponent(excludeParam).split(',');
                        filteredData = Object.fromEntries(
                            Object.entries(data).filter(([path, cardInfo]) => {
                                return !excludeList.includes(cardInfo.title);
                            })
                        );
                    }

                    const app = new TarotApp(filteredData);
                    app.init();
                    if (window.Telegram && Telegram.WebApp) {
                        Telegram.WebApp.ready();
                    }
                })
                .catch(error => console.error('Ошибка загрузки карт:', error));
        }

        class TarotApp {
            constructor(cardsData) {
                this.cardsData = Object.entries(cardsData);
                this.cardsEntries = Object.entries(cardsData);
                this.cardContainer = document.getElementById('card-container');
                this.selectedRow = document.getElementById('selected-row');
                this.promptElement = document.getElementById('prompt');
                this.fateButton = document.getElementById('fateButton');

                this.clickCount = 0;
                this.selectedCardsList = [];
                this.animationCompleteCount = 0;
            }

            init() {
                this.setupSelectedCardSlots();
                this.renderCards();
                this.setupButtonHandler();
            }

            setupSelectedCardSlots() {
                for (let i = 0; i < CONFIG.SELECT_CARDS; i++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'selected-card-wrapper';
                    wrapper.dataset.index = i;
                    this.selectedRow.appendChild(wrapper);
                }
            }

            renderCards() {
                const selectedCards = this.getRandomCards(this.cardsData, CONFIG.TOTAL_CARDS);
                this.currentCards = selectedCards;

                selectedCards.forEach((card, index) => {
                    const wrapper = this.createCardWrapper();
                    const cardElement = this.createCardElement(index);
                    cardElement.dataset.index = index;
                    const cardFront = this.createCardFront(card[0]);
                    const cardBack = this.createCardBack();

                    cardElement.appendChild(cardFront);
                    cardElement.appendChild(cardBack);
                    wrapper.appendChild(cardElement);
                    this.cardContainer.appendChild(wrapper);

                    wrapper.addEventListener('click', () => this.handleCardClick(cardElement, wrapper));
                });
            }

            createCardWrapper() {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.opacity = '1';
                return wrapper;
            }

            createCardElement(index) {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.index = index;
                return cardElement;
            }

            createCardFront(imageUrl) {
                const cardFront = document.createElement('div');
                cardFront.className = 'card-front';
                cardFront.style.backgroundImage = `url('${imageUrl}')`;
                return cardFront;
            }

            createCardBack() {
                const cardBack = document.createElement('div');
                cardBack.className = 'card-back';
                return cardBack;
            }

            handleCardClick(card, wrapper) {
                if (!card.classList.contains('flipped') && this.clickCount < CONFIG.SELECT_CARDS) {
                    card.classList.add('flipped');
                    this.clickCount++;

                    setTimeout(() => {
                        card.classList.add('card-flipped-glow');
                    }, CONFIG.FLIP_DELAY);

                    const idx = Number(card.dataset.index);
                    const [image_path, data] = this.currentCards[idx];
                    this.selectedCardsList.push({
                        card,
                        wrapper,
                        title: data.title,
                        meaning: data.meaning,
                        chain_meaning: data.chain_meaning,
                        image_path
                    });

                    if (this.clickCount === CONFIG.SELECT_CARDS) {
                        this.promptElement.classList.add('fade-out');
                        setTimeout(() => {
                            this.moveSelectedCards();
                        }, CONFIG.PROMPT_FADE_DELAY);
                    }
                }
            }

            moveSelectedCards() {
                this.hideUnselectedCards();
                this.prepareTargetSlots();
                this.animateCardsMovement();
            }

            hideUnselectedCards() {
                const allWrappers = document.querySelectorAll('.card-wrapper');
                allWrappers.forEach(wrapper => {
                    if (!this.selectedCardsList.some(c => c.wrapper === wrapper)) {
                        wrapper.style.opacity = '0',
                        wrapper.style.pointerEvents = 'none';
                    }
                });
            }

            prepareTargetSlots() {
                const targetWrappers = document.querySelectorAll('.selected-card-wrapper');
                targetWrappers.forEach(wrapper => {
                    wrapper.style.opacity = '0';
                    wrapper.innerHTML = '';
                });
            }

            animateCardsMovement() {
                this.selectedCardsList.forEach(({card, wrapper}, index) => {
                    const targetWrapper = document.querySelectorAll('.selected-card-wrapper')[index];
                    const cardRect = card.getBoundingClientRect();
                    const targetRect = targetWrapper.getBoundingClientRect();

                    const flyingCard = this.createFlyingCard(card, cardRect);
                    document.body.appendChild(flyingCard);

                    wrapper.style.opacity = '0';

                    setTimeout(() => {
                        this.animateCardMovement(flyingCard, targetRect, targetWrapper, card);
                    }, CONFIG.CARD_MOVE_DELAY);
                });
            }

            createFlyingCard(card, cardRect) {
                const flyingCard = card.cloneNode(true);
                flyingCard.className = 'card flipped card-flipped-glow flying-card';
                flyingCard.style.width = `${cardRect.width}px`;
                flyingCard.style.height = `${cardRect.height}px`;
                flyingCard.style.left = `${cardRect.left}px`;
                flyingCard.style.top = `${cardRect.top}px`;
                return flyingCard;
            }

            animateCardMovement(flyingCard, targetRect, targetWrapper, originalCard) {
                flyingCard.style.left = `${targetRect.left}px`;
                flyingCard.style.top = `${targetRect.top}px`;
                flyingCard.style.width = `${targetRect.width}px`;
                flyingCard.style.height = `${targetRect.height}px`;

                setTimeout(() => {
                    this.finalizeCardMovement(flyingCard, targetWrapper, originalCard);
                }, 750);
            }

            finalizeCardMovement(targetWrapper, originalCard) {
                const finalCard = originalCard.cloneNode(true);
                finalCard.className = 'card flipped card-flipped-glow';
                targetWrapper.appendChild(finalCard);
                targetWrapper.style.opacity = '1';

                this.animationCompleteCount++;

                if (this.animationCompleteCount === CONFIG.SELECT_CARDS) {
                    setTimeout(() => {
                        this.showFateButton();
                    }, CONFIG.BUTTON_SHOW_DELAY);
                }
            }

            showFateButton() {
                this.fateButton.disabled = false;
                this.fateButton.style.pointerEvents = 'auto';
                this.fateButton.classList.add('visible');
            }

            setupButtonHandler() {
              this.fateButton.addEventListener('click', () => {
                this.fateButton.disabled = true;
                this.fateButton.style.pointerEvents = 'none';

                const selectedTitles = this.selectedCardsList.map(c => c.title);

                const payload = {
                    user_id: Telegram.WebApp.initDataUnsafe.user?.id,
                    selectedCards: this.selectedCardsList.map(c => ({
                        title: c.title,
                        image_path: c.image_path
                    }))
                };

                const apiBase = window.location.origin;

                fetch(`${apiBase}/webapp-data/`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                Telegram.WebApp.close();
              }, { once: true });
            }

            getRandomCards(cards, count) {
                const shuffled = [...cards];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled.slice(0, count);
            }
        }
    </script>
</body>
</html>
